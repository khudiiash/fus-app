# Unused for this project: we ship a static PWA via Firebase Hosting (`npm run build` → `firebase deploy --only hosting`).
# App Hosting triggers Cloud Build + Cloud Run; remove `apphosting` from firebase.json unless you need that stack.
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
# env:
